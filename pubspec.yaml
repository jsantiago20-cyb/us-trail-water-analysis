name: us_trail_water_analysis
description: "Find water sources along any US trail GPX route"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.2
  file_picker: ^8.1.4
  share_plus: ^10.1.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  ios: true
  android: true
  remove_alpha_ios: true
  background_color_ios: "#1565C0"
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#1565C0"
    theme_color: "#1565C0"

flutter:
  uses-material-design: true
  assets:
    - assets/demo/
